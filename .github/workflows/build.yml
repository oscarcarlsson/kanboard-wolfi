name: Docker Image CI

on:
  push:
    branches: [ "trunk" ]
  pull_request:
    branches: [ "trunk" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: extractions/setup-just@v3
      with:
        just-version: '1.40.0'
        
    - uses: actions/checkout@v4
    
    - name: Build the Docker image
      run: just build $(date +%s)

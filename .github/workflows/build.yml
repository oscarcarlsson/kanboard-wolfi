name: Docker Image CI

on:
  push:
    branches: [ "trunk" ]
  pull_request:
    branches: [ "trunk" ]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
    - uses: extractions/setup-just@v3
      with:
        just-version: '1.40.0'
        
    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: kanboard/kanboard
        # 1.2.47
        ref: 'b57deb7082797b791a3fa39dbcdc5e5c2b14b541'
        path: 'app'
    
    - name: Build the Docker image
      run: just build $(date +%s)
